{% extends "base.html" %}
{% block title %}لاگ ان{% endblock %}
{% block navbar %}{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4">
            <div class="text-center mb-4">
                <div style="width: 80px; height: 80px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto;">
                    <i class="fas fa-store" style="font-size: 2rem; color: var(--primary-color);"></i>
                </div>
                <h3 class="mt-3">اپنا آن لائن اسٹور</h3>
                <p class="text-muted">اپنے اکاؤنٹ میں لاگ ان کریں</p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-phone"></i> فون نمبر</label>
                    <input type="tel" name="phone" class="form-control" placeholder="03001234567" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-lock"></i> پاس ورڈ</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="fas fa-sign-in-alt"></i> لاگ ان
                </button>
                <div class="text-center">
                    <p class="mb-0">اکاؤنٹ نہیں؟ <a href="{{ url_for('customer_register') }}">رجسٹر کریں</a></p>
                    <p class="mt-2"><a href="{{ url_for('admin_login') }}" class="text-muted small"><i class="fas fa-user-shield"></i> ایڈمن لاگ ان</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
